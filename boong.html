<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gõ Chuông - Gõ Mõ Trực Tuyến</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --bg-center: #2b231ccf;
            --bg-edge: #0a0806;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-edge) 100%);
            color: var(--gold-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glowing particles effect */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff33, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff22, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ffffff22, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff33, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #ffffff22, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ffffff22, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: drift 60s linear infinite;
            opacity: 0.4;
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }

        .header {
            text-align: center;
            z-index: 10;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.8;
            font-style: italic;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            gap: 4rem;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            padding: 2rem;
        }

        .item-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .item {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(20, 15, 10, 0.6);
            border: 2px solid rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* SVG Inner Glow */
        .item svg {
            width: 80px;
            height: 80px;
            fill: var(--gold);
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
            transition: all 0.2s ease;
        }

        .item:hover {
            border-color: rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.8);
            transform: translateY(-5px);
        }

        .item:hover svg {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.8));
            transform: scale(1.05);
        }

        .item:active {
            transform: scale(0.95);
        }

        .item::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid var(--gold);
            opacity: 0;
            z-index: -1;
        }

        .item.playing::after {
            animation: ripple 1.5s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        .item-label {
            font-size: 1.2rem;
            color: var(--gold-light);
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* Volume controls */
        .controls {
            position: absolute;
            bottom: 2rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .controls:hover {
            opacity: 1;
        }

        .volume-icon {
            width: 20px;
            height: 20px;
            fill: var(--gold);
        }

        input[type=range] {
            appearance: none;
            -webkit-appearance: none;
            width: 150px;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 2px;
        }

        .floating-text {
            position: absolute;
            color: var(--gold);
            font-size: 1.5rem;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
            text-shadow: 0 0 10px var(--gold);
            animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, 0) scale(0.8); opacity: 0; }
            20% { opacity: 0.8; transform: translate(-50%, -20px) scale(1.1); }
            100% { transform: translate(-50%, -100px) scale(1); opacity: 0; }
        }

        .mandala {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            max-width: 800px;
            max-height: 800px;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.05);
            pointer-events: none;
            z-index: 0;
            animation: spin 120s linear infinite;
            background-image: repeating-radial-gradient(circle at center, transparent, transparent 40px, rgba(212, 175, 55, 0.03) 41px, transparent 42px);
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; gap: 3rem; }
            .item { width: 140px; height: 140px; }
            .item svg { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="mandala"></div>

    <div class="header">
        <h1>TĨNH TÂM</h1>
        <p>Gõ để trút bỏ phiền não, tìm về khoảng lặng</p>
    </div>

    <div class="container">
        <!-- Chuông -->
        <div class="item-wrapper">
            <div class="item" id="btn-chuong" onclick="playChuong(event)">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22ZM18 16V11C18 7.93 16.36 5.36 13.5 4.68V4C13.5 3.17 12.83 2.5 12 2.5C11.17 2.5 10.5 3.17 10.5 4V4.68C7.63 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16ZM16 17H8V11C8 8.52 9.51 6.5 12 6.5C14.49 6.5 16 8.52 16 11V17Z"/>
                </svg>
            </div>
            <div class="item-label">Chuông</div>
        </div>

        <!-- Mõ -->
        <div class="item-wrapper">
            <div class="item" id="btn-mo" onclick="playMo(event)">
                <!-- Biểu tượng hoa sen cách điệu thay cho mõ -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C12 2 8 6 8 12C8 18 12 22 12 22C12 22 16 18 16 12C16 6 12 2 12 2ZM3.5 10C3.5 10 2 13 4 17.5C6 22 12 22 12 22C12 22 6.5 21 5.5 15C5 12 3.5 10 3.5 10ZM20.5 10C20.5 10 22 13 20 17.5C18 22 12 22 12 22C12 22 17.5 21 18.5 15C19 12 20.5 10 20.5 10Z"/>
                </svg>
            </div>
            <div class="item-label">Mõ</div>
        </div>
    </div>

    <div class="controls">
        <svg class="volume-icon" viewBox="0 0 24 24">
            <path d="M3 9V15H7L12 20V4L7 9H3ZM16.5 12C16.5 10.23 15.48 8.71 14 7.97V16.02C15.48 15.29 16.5 13.77 16.5 12ZM14 3.23V5.29C16.89 6.15 19 8.83 19 12C19 15.17 16.89 17.85 14 18.71V20.77C18.01 19.86 21 16.28 21 12C21 7.72 18.01 4.14 14 3.23Z"/>
        </svg>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
    </div>

    <script>
        let audioCtx;
        let masterGain;
        const MO_SAMPLE_URL = 'assets/mo_click.m4a';
        const MO_GAIN = 2.0;
        let moSampleBuffer = null;
        let moSampleLoading = null;
        let moGain;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);

                moGain = audioCtx.createGain();
                moGain.gain.value = MO_GAIN;
                moGain.connect(masterGain);
                
                const slider = document.getElementById('volume-slider');
                masterGain.gain.value = slider.value;
                slider.addEventListener('input', (e) => {
                    masterGain.gain.value = e.target.value;
                });

                // Preload short mo sample
                moSampleLoading = fetch(MO_SAMPLE_URL)
                    .then((res) => {
                        if (!res.ok) throw new Error('Cannot load mo sample');
                        return res.arrayBuffer();
                    })
                    .then((arr) => audioCtx.decodeAudioData(arr))
                    .then((buf) => {
                        moSampleBuffer = buf;
                    })
                    .catch(() => {
                        moSampleBuffer = null;
                    });
            }
        }

        function playMoSample(t) {
            if (!moSampleBuffer) return false;
            const src = audioCtx.createBufferSource();
            src.buffer = moSampleBuffer;
            src.connect(moGain);
            src.start(t);
            return true;
        }

        function createFloatingText(e, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            
            const rect = e.currentTarget.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top;
            
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        function triggerRipple(btnId) {
            const btn = document.getElementById(btnId);
            btn.classList.remove('playing');
            void btn.offsetWidth;
            btn.classList.add('playing');
        }

        async function playChuong(e) {
            initAudio();
            if(audioCtx.state === 'suspended') await audioCtx.resume();
            triggerRipple('btn-chuong');
            createFloatingText(e, 'Boong...');

            const t = audioCtx.currentTime;
            
            // Physical Modeling of a Temple Bell
            // Frequencies based on modal analysis of a singing bowl / temple bell
            // Using slightly detuned pairs to create the characteristic "beating" (vibrato) effect

            const modes = [
                { f: 220, A: 1.0, decay: 15.0 },
                { f: 222, A: 0.9, decay: 15.0 }, // Beating pair for fundamental
                { f: 600, A: 0.6, decay: 8.0 },
                { f: 603, A: 0.5, decay: 8.0 },  // Beating pair
                { f: 1050, A: 0.3, decay: 4.0 },
                { f: 1500, A: 0.15, decay: 2.0 },
                { f: 2100, A: 0.08, decay: 1.0 },
                { f: 3300, A: 0.02, decay: 0.5 }
            ];

            modes.forEach((mode) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(mode.f, t);
                
                gain.gain.setValueAtTime(0, t);
                // Sharper attack for higher frequencies
                const attackTime = mode.f > 1000 ? 0.005 : 0.02;
                gain.gain.linearRampToValueAtTime(mode.A, t + attackTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + mode.decay);
                
                osc.connect(gain).connect(masterGain);
                osc.start(t);
                osc.stop(t + mode.decay);
            });

            // Strike noise (the mallet hitting metal)
            const noiseLength = audioCtx.sampleRate * 0.05; // 50ms of noise
            const buffer = audioCtx.createBuffer(1, noiseLength, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < noiseLength; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noiseSrc = audioCtx.createBufferSource();
            noiseSrc.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 800;
            noiseFilter.Q.value = 1.0;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.5, t);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
            
            noiseSrc.connect(noiseFilter).connect(noiseGain).connect(masterGain);
            noiseSrc.start(t);
        }

        async function playMo(e) {
            initAudio();
            if(audioCtx.state === 'suspended') await audioCtx.resume();
            triggerRipple('btn-mo');
            createFloatingText(e, 'Cốc...');

            const t = audioCtx.currentTime;

            if (moSampleLoading) {
                await moSampleLoading;
            }
            playMoSample(t);
        }
    </script>
</body>
</html>
