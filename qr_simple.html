<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tạo mã QR từ đường link</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
    }
    .file-label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    #logoInput {
      padding: 0;
    }
    #logoPreview {
      display: none;
      max-width: 120px;
      max-height: 120px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 6px;
      object-fit: contain;
      background: #fff;
    }
    #qr canvas {
      display: block;
      margin-top: 20px;
      border: 1px solid #ccc;
    }
    #downloadLink {
      display: none;
      margin-top: 10px;
      padding: 8px 16px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    #downloadLink:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Tạo mã QR từ link</h1>

  <input type="text" id="urlInput" placeholder="Nhập link tại đây (https://...)">
  <label class="file-label" for="logoInput">Chọn logo/ảnh ở giữa QR (tuỳ chọn)</label>
  <input type="file" id="logoInput" accept="image/*">
  <img id="logoPreview" alt="Xem trước logo đã chọn">
  <button onclick="generateQR()">Tạo mã QR</button>

  <div id="qr"></div>
  <a id="downloadLink" download="qr_code.png">📥 Tải mã QR (PNG)</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script>
    const logoInput = document.getElementById("logoInput");
    const logoPreview = document.getElementById("logoPreview");

    logoInput.addEventListener("change", async (event) => {
      const [file] = event.target.files;

      if (!file) {
        logoPreview.style.display = "none";
        logoPreview.removeAttribute("src");
        return;
      }

      try {
        const logoImage = await readImageFile(file);
        logoPreview.src = logoImage.src;
        logoPreview.style.display = "block";
      } catch (error) {
        logoPreview.style.display = "none";
        logoPreview.removeAttribute("src");
        alert("Không thể đọc file ảnh đã chọn.");
      }
    });

    function readImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const image = new Image();

          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("Invalid image"));
          image.src = reader.result;
        };

        reader.onerror = () => reject(new Error("Cannot read file"));
        reader.readAsDataURL(file);
      });
    }

    function fillRoundedRect(ctx, x, y, width, height, radius) {
      const safeRadius = Math.min(radius, width / 2, height / 2);

      ctx.beginPath();
      ctx.moveTo(x + safeRadius, y);
      ctx.lineTo(x + width - safeRadius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + safeRadius);
      ctx.lineTo(x + width, y + height - safeRadius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - safeRadius, y + height);
      ctx.lineTo(x + safeRadius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - safeRadius);
      ctx.lineTo(x, y + safeRadius);
      ctx.quadraticCurveTo(x, y, x + safeRadius, y);
      ctx.closePath();
      ctx.fill();
    }

    function drawCenteredLogo(ctx, canvasSize, image) {
      const logoSize = Math.floor(canvasSize * 0.22);
      const padding = Math.floor(logoSize * 0.18);
      const backgroundSize = logoSize + padding * 2;
      const backgroundX = Math.floor((canvasSize - backgroundSize) / 2);
      const backgroundY = Math.floor((canvasSize - backgroundSize) / 2);
      const logoX = Math.floor((canvasSize - logoSize) / 2);
      const logoY = Math.floor((canvasSize - logoSize) / 2);

      ctx.fillStyle = "#ffffff";
      fillRoundedRect(ctx, backgroundX, backgroundY, backgroundSize, backgroundSize, 16);

      ctx.drawImage(image, logoX, logoY, logoSize, logoSize);
    }

    async function generateQR() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) {
        alert("Vui lòng nhập một đường link.");
        return;
      }

      let logoImage = null;
      const [logoFile] = logoInput.files;

      if (logoFile) {
        try {
          logoImage = await readImageFile(logoFile);
        } catch (error) {
          alert("Logo/ảnh không hợp lệ. Vui lòng chọn file ảnh khác.");
          return;
        }
      }

      const qr = qrcode(0, 'H');
      qr.addData(url);
      qr.make();

      const moduleCount = qr.getModuleCount();
      const finalSize = 378; // ~10cm
      const cellSize = Math.floor(finalSize / moduleCount);
      const canvasSize = cellSize * moduleCount;

      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = canvasSize;
      const ctx = canvas.getContext("2d");

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          ctx.fillStyle = qr.isDark(row, col) ? "#000000" : "#ffffff";
          ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }

      if (logoImage) {
        drawCenteredLogo(ctx, canvasSize, logoImage);
      }

      const qrContainer = document.getElementById("qr");
      qrContainer.innerHTML = "";
      qrContainer.appendChild(canvas);

      const downloadLink = document.getElementById("downloadLink");
      downloadLink.href = canvas.toDataURL("image/png");
      downloadLink.style.display = "inline-block";
    }
  </script>
</body>
</html>
